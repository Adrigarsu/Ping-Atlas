services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PROBE_INTERVAL_SECONDS: ${PROBE_INTERVAL_SECONDS:-300}
      PROBE_TARGETS: ${PROBE_TARGETS:-8.8.8.8,1.1.1.1}
      LATENCY_ALERT_DELTA_MS: ${LATENCY_ALERT_DELTA_MS:-50}
      MAX_HOPS: ${MAX_HOPS:-30}
      API_KEYS: ${API_KEYS:-}
      GEOIP_DB_PATH: /app/GeoLite2-City.mmdb
    volumes:
      - ./backend:/app
    cap_add:
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres-data: